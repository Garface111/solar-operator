[build]
builder = "RAILPACK"
# SPA pre-built and committed at api/onboarding_dist/ (see build_onboarding.sh).
# No buildCommand: Railpack only provisions Python, npm is not on PATH here.

[deploy]
startCommand = "python -m api.migrate && uvicorn api.app:app --host 0.0.0.0 --port ${PORT:-8000}"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
