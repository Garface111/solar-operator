[build]
builder = "RAILPACK"
# SPA pre-built and committed at api/onboarding_dist/ (see build_onboarding.sh).
# No buildCommand: Railpack only provisions Python, npm is not on PATH here.

[deploy]
startCommand = "sh start.sh"
healthcheckPath = "/health"
# The startCommand runs the full migration (create_all + backfills) BEFORE uvicorn
# binds the port, so /health can't answer until migrate finishes. 30s raced that
# on a heavier run and rolled a good deploy back; widen the window to cover
# migrate + boot comfortably. (Migrations are idempotent/guarded, so this only
# affects how long Railway waits for the first healthy response.)
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
