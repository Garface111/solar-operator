<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Solar Operator — Architecture Slideshow</title>
<style>
  :root{
    --bg:#0b0f14; --panel:#11161d; --panel2:#161d26; --line:#232c38;
    --text:#e6edf3; --dim:#8b98a9;
    --cap:#22d3ee;   /* capture / extension */
    --api:#a78bfa;   /* backend API */
    --state:#f5b02c; /* state / persistence */
    --jobs:#34d399;  /* background jobs */
    --ext:#fb7185;   /* external services */
    --out:#e2e8f0;   /* people / deliverables */
  }
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{background:var(--bg); color:var(--text);
    font:15px/1.45 system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
  .wrap{max-width:1280px; margin:0 auto; padding:14px 18px 26px}

  header{display:flex; align-items:center; gap:18px; flex-wrap:wrap; padding:4px 2px 12px}
  header h1{font-size:17px; font-weight:650; letter-spacing:.2px; white-space:nowrap}
  header h1 span{color:var(--dim); font-weight:450}
  #chapName{font-size:14px; color:var(--dim); flex:1; min-width:160px}
  #chapName b{color:var(--text); font-weight:600}
  .legend{display:flex; gap:14px; flex-wrap:wrap; font-size:12px; color:var(--dim)}
  .legend i{display:inline-block; width:10px; height:10px; border-radius:3px; margin-right:5px; vertical-align:-1px}

  .stage{position:relative; background:var(--panel); border:1px solid var(--line);
    border-radius:14px; overflow:hidden; cursor:pointer}
  .stage svg{display:block; width:100%; height:auto}

  /* ── diagram element states ─────────────────────────────── */
  .el{opacity:0; transition:opacity .45s ease, transform .45s ease; transform:translateY(7px)}
  .el.on{opacity:1; transform:none}
  .ghostable .el{opacity:.14; transform:none; transition:opacity .45s ease}
  .ghostable .el.on{opacity:1}
  .el.hot .box{filter:drop-shadow(0 0 7px currentColor); stroke-width:2.4}
  .el.hot .edge{filter:drop-shadow(0 0 5px currentColor); stroke-width:2.6}
  .el.hot text.t{fill:#fff}

  .node .box{rx:10; stroke-width:1.6}
  .cap  {color:var(--cap)}   .cap  .box{stroke:var(--cap);   fill:rgba(34,211,238,.09)}
  .api  {color:var(--api)}   .api  .box{stroke:var(--api);   fill:rgba(167,139,250,.10)}
  .state{color:var(--state)} .state.node .box{stroke:var(--state); fill:rgba(245,176,44,.09)}
  .jobs {color:var(--jobs)}  .jobs .box{stroke:var(--jobs);  fill:rgba(52,211,153,.09)}
  .ext  {color:var(--ext)}   .ext  .box{stroke:var(--ext);   fill:rgba(251,113,133,.09)}
  .out  {color:var(--out)}   .out  .box{stroke:var(--out);   fill:rgba(226,232,240,.07)}

  text{user-select:none}
  text.t{fill:var(--text); font-size:15px; font-weight:640;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
  text.t.sm{font-size:12px; font-weight:560;
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
  text.s{fill:var(--dim); font-size:11.4px;
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
  text.elabel{fill:var(--dim); font-size:11px; paint-order:stroke; stroke:var(--panel);
    stroke-width:6px; stroke-linejoin:round;
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
  .edge{fill:none; stroke:currentColor; stroke-width:1.7; opacity:.92}
  .dash .edge{stroke-dasharray:6 5}
  .frame-box{fill:none; stroke:var(--line); stroke-width:1.4; stroke-dasharray:8 6; rx:14}
  text.frame-label{fill:var(--dim); font-size:12px; font-weight:600; letter-spacing:.6px}
  text.note-big{fill:var(--text); font-size:38px; font-weight:700; text-anchor:middle}
  text.note-sub{fill:var(--dim); font-size:16px; text-anchor:middle}

  /* ── caption + controls ─────────────────────────────────── */
  .caption{min-height:46px; display:flex; align-items:center; justify-content:center;
    text-align:center; padding:10px 20px 2px; font-size:15.5px; color:var(--text)}
  .caption b{color:var(--state)}
  .controls{display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:10px 14px; margin-top:8px}
  .controls button{background:var(--panel2); color:var(--text); border:1px solid var(--line);
    border-radius:8px; padding:7px 13px; font-size:14px; cursor:pointer}
  .controls button:hover{border-color:var(--dim)}
  .controls button.play{min-width:86px; font-weight:600}
  .speed{display:flex; align-items:center; gap:8px; font-size:12.5px; color:var(--dim)}
  .speed input{accent-color:var(--jobs); width:130px}
  select{background:var(--panel2); color:var(--text); border:1px solid var(--line);
    border-radius:8px; padding:7px 9px; font-size:13.5px; max-width:280px}
  .count{font-size:12.5px; color:var(--dim); font-variant-numeric:tabular-nums; margin-left:auto}
  .bar{height:4px; background:var(--line); border-radius:2px; overflow:hidden; margin-top:10px}
  .bar i{display:block; height:100%; width:0; background:linear-gradient(90deg,var(--cap),var(--jobs));
    transition:width .3s ease}
  .hint{font-size:11.5px; color:var(--dim); text-align:center; margin-top:8px}
  kbd{background:var(--panel2); border:1px solid var(--line); border-radius:4px;
    padding:0 5px; font-size:11px}
</style>
</head>

<div class="wrap">
  <header>
    <h1>Solar Operator <span>· architecture</span></h1>
    <div id="chapName"></div>
    <div class="legend">
      <span><i style="background:var(--cap)"></i>capture / extension</span>
      <span><i style="background:var(--api)"></i>backend API</span>
      <span><i style="background:var(--state)"></i>state / persistence</span>
      <span><i style="background:var(--jobs)"></i>background jobs</span>
      <span><i style="background:var(--ext)"></i>external services</span>
      <span><i style="background:var(--out)"></i>people / deliverables</span>
    </div>
  </header>

  <div class="stage" id="stage">
    <svg viewBox="0 0 1200 680" id="svg" aria-label="architecture diagram">
      <defs id="defs"></defs>
    </svg>
  </div>
  <div class="bar"><i id="prog"></i></div>
  <div class="caption" id="cap"></div>

  <div class="controls">
    <button id="prev" title="previous frame (←)">⏮ back</button>
    <button id="play" class="play" title="play / pause (space)">▶ play</button>
    <button id="next" title="next frame (→)">next ⏭</button>
    <div class="speed">
      <span>speed</span>
      <input type="range" id="speed" min="500" max="5000" step="100" value="1800">
      <span id="speedLabel">1.8s / frame</span>
    </div>
    <select id="chapSel" title="jump to chapter"></select>
    <div class="count" id="count"></div>
  </div>
  <div class="hint"><kbd>←</kbd> <kbd>→</kbd> step · <kbd>space</kbd> play/pause · click the right/left half of the diagram to step · every label is a real file, function, or table in this repo</div>
</div>

   RENDER ENGINE
   ════════════════════════════════════════════════════════════════ */
const NS='http://www.w3.org/2000/svg';
const svg=document.getElementById('svg');
const defs=document.getElementById('defs');
const el=(n,at)=>{const e=document.createElementNS(NS,n);for(const k in at)e.setAttribute(k,at[k]);return e;};

['cap','api','state','jobs','ext','out'].forEach(c=>{
  const col=getComputedStyle(document.documentElement).getPropertyValue('--'+c).trim();
  const m=el('marker',{id:'arr-'+c,viewBox:'0 0 10 10',refX:'8.5',refY:'5',
    markerWidth:'7',markerHeight:'7',orient:'auto-start-reverse'});
  m.appendChild(el('path',{d:'M0,0 L10,5 L0,10 z',fill:col}));
  defs.appendChild(m);
});

const nodeIndex={};   // id -> rect geometry, for edges
const domIndex={};    // id -> <g> element

function drawNode(g,n){
  const grp=el('g',{class:`el node ${n.cls}`,id:'el-'+n.id});
  grp.appendChild(el('rect',{class:'box',x:n.x,y:n.y,width:n.w,height:n.h,rx:10}));
  if(n.small){
    const t=el('text',{class:'t sm',x:n.x+n.w/2,y:n.y+n.h/2+4.5,'text-anchor':'middle'});
    t.textContent=n.t; grp.appendChild(t);
  }else{
    const t=el('text',{class:'t',x:n.x+16,y:n.y+27}); t.textContent=n.t; grp.appendChild(t);
    (n.s||[]).forEach((line,i)=>{
      const s=el('text',{class:'s',x:n.x+16,y:n.y+47+i*15.5}); s.textContent=line; grp.appendChild(s);
    });
  }
  g.appendChild(grp); nodeIndex[n.id]=n; domIndex[n.id]=grp;
}

function anchor(a,b){ // point on a's border toward b's center
  const ax=a.x+a.w/2, ay=a.y+a.h/2, bx=b.x+b.w/2, by=b.y+b.h/2;
  const dx=bx-ax, dy=by-ay;
  if(!dx&&!dy) return [ax,ay];
  const sx=dx?(a.w/2)/Math.abs(dx):Infinity, sy=dy?(a.h/2)/Math.abs(dy):Infinity;
  const s=Math.min(sx,sy);
  return [ax+dx*s, ay+dy*s];
}

function drawEdge(g,e){
  const a=nodeIndex[e.from], b=nodeIndex[e.to];
  const [x1,y1]=anchor(a,b), [x2r,y2r]=anchor(b,a);
  // pull back the tip a touch so the arrowhead sits on the border
  const dx=x2r-x1, dy=y2r-y1, len=Math.hypot(dx,dy)||1;
  const x2=x2r-dx/len*3, y2=y2r-dy/len*3;
  const grp=el('g',{class:`el ${e.cls}${e.dash?' dash':''}`,id:'el-'+e.id});
  const ln=el('line',{class:'edge',x1,y1,x2,y2,'marker-end':`url(#arr-${e.cls})`});
  if(e.both) ln.setAttribute('marker-start',`url(#arr-${e.cls})`);
  grp.appendChild(ln);
  if(e.label){
    const t=el('text',{class:'elabel',x:(x1+x2)/2,y:(y1+y2)/2-7,'text-anchor':'middle'});
    t.textContent=e.label; grp.appendChild(t);
  }
  g.appendChild(grp); domIndex[e.id]=grp;
}

const sceneGroups={};
for(const sc in SCENES){
  const S=SCENES[sc];
  const g=el('g',{id:'scene-'+sc,class:S.ghost?'ghostable':''});
  g.style.display='none';
  (S.frames||[]).forEach(f=>{
    const grp=el('g',{class:'el',id:'el-'+f.id});
    grp.appendChild(el('rect',{class:'frame-box',x:f.x,y:f.y,width:f.w,height:f.h,rx:14}));
    const t=el('text',{class:'frame-label',x:f.x+16,y:f.y+24}); t.textContent=f.label;
    grp.appendChild(t); g.appendChild(grp); domIndex[f.id]=grp;
  });
  (S.nodes||[]).forEach(n=>drawNode(g,n));
  (S.edges||[]).forEach(e=>drawEdge(g,e));
  (S.notes||[]).forEach(n=>{
    const grp=el('g',{class:'el',id:'el-'+n.id});
    const t=el('text',{class:n.big?'note-big':'note-sub',x:n.x,y:n.y});
    t.textContent=n.text; grp.appendChild(t); g.appendChild(grp); domIndex[n.id]=grp;
  });
  svg.appendChild(g); sceneGroups[sc]=g;
}

function render(){
  const f=F[idx], sc=f.sc, ghost=!!SCENES[sc].ghost;
  for(const s in sceneGroups) sceneGroups[s].style.display=(s===sc)?'':'none';
  // visible = union of add-lists for frames of this scene up to idx
  const on=new Set(), hot=new Set(f.add);
  for(let j=0;j<=idx;j++) if(F[j].sc===sc) F[j].add.forEach(id=>on.add(id));
  const S=SCENES[sc];
  const all=[...(S.nodes||[]),...(S.edges||[]),...(S.notes||[]),...(S.frames||[])];
  all.forEach(it=>{
    const d=domIndex[it.id];
    d.classList.toggle('on', ghost ? on.has(it.id) : on.has(it.id));
    if(ghost) d.classList.add('ghost');
    d.classList.toggle('hot', hot.has(it.id));
  });
  capEl.textContent=f.cap;
  const c=chapterOf(idx);
  chapName.innerHTML=`<b>${CHAPTERS[c].name}</b>`;
  chapSel.value=CHAPTERS[c].start;
  count.textContent=`frame ${idx+1} / ${F.length}`;
  prog.style.width=((idx+1)/F.length*100)+'%';
}

function step(d){ idx=Math.max(0,Math.min(F.length-1,idx+d)); render(); if(idx===F.length-1) pause(); }
function goTo(i){ idx=Math.max(0,Math.min(F.length-1,i)); render(); }

function tick(){ if(!playing) return;
  if(idx>=F.length-1){ pause(); return; }
  step(1); timer=setTimeout(tick, +speed.value);
}
function play(){ if(playing) return; playing=true; playBtn.textContent='⏸ pause';
  if(idx>=F.length-1) idx=-1;   // replay from start when at the end
  timer=setTimeout(tick, +speed.value); if(idx===-1){ idx=0; render(); } }
function pause(){ playing=false; playBtn.textContent='▶ play'; clearTimeout(timer); }

playBtn.onclick=()=>playing?pause():play();
document.getElementById('prev').onclick=()=>{pause();step(-1);};
document.getElementById('next').onclick=()=>{pause();step(1);};
speed.oninput=()=>{ speedLabel.textContent=(speed.value/1000).toFixed(1)+'s / frame'; };
chapSel.onchange=()=>{ pause(); goTo(+chapSel.value); };
document.getElementById('stage').onclick=(e)=>{
  pause();
  const r=e.currentTarget.getBoundingClientRect();
  step(e.clientX-r.left > r.width/2 ? 1 : -1);
};
document.addEventListener('keydown',(e)=>{
  if(e.key==='ArrowRight'){ pause(); step(1); e.preventDefault(); }
  else if(e.key==='ArrowLeft'){ pause(); step(-1); e.preventDefault(); }
  else if(e.key===' '){ playing?pause():play(); e.preventDefault(); }
  else if(e.key==='Home'){ pause(); goTo(0); }
  else if(e.key==='End'){ pause(); goTo(F.length-1); }
});

render();
</script>
</body>
</html>
