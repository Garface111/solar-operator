    <title>Account · EnergyAgent</title>
    <!-- One SPA serves both products (NEPOOL Operator + Array Operator). Brand the
         tab title by the host the user actually came in on. The Netlify 200-proxy
         preserves the address-bar hostname, so location.hostname is reliable here.
         Runs before paint so there's no NEPOOL→AO title flash on arrayoperator.com. -->
    <script>
      (function () {
        try {
          var h = location.hostname || "";
          var isAO = /(^|\.)arrayoperator\.com$/.test(h) || h.indexOf("array-operator") !== -1;
          document.title = isAO ? "Account · Array Operator" : "Account · NEPOOL Operator";
        } catch (e) {}
      })();
    </script>
