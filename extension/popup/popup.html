<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Solar Operator</title>
<style>
  body {
    width: 340px;
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #222;
    background: #fff;
  }
  .header {
    background: #2e6b3a;
    color: #fff;
    padding: 14px 16px;
  }
  .header h1 { margin: 0; font-size: 15px; font-weight: 600; letter-spacing: 0.3px; }
  .header .sub { font-size: 11px; color: #cfe4d3; margin-top: 2px; }
  .body { padding: 14px 16px; font-size: 13px; line-height: 1.5; }
  .status {
    padding: 10px 12px;
    border-radius: 6px;
    margin-bottom: 12px;
    font-size: 12.5px;
  }
  .status.ok { background: #eef3ec; border-left: 3px solid #2e6b3a; color: #1f4e2a; }
  .status.warn { background: #fdf3ea; border-left: 3px solid #c97a3d; color: #7a4520; }
  .status.idle { background: #f0f0f0; border-left: 3px solid #999; color: #555; }
  .status a { color: inherit; text-decoration: underline; }
  .hint { margin-top: 8px; padding: 8px 10px; font-size: 11.5px;
          background: #fdf3ea; color: #7a4520; border-radius: 4px; }
  .warn-text { color: #c97a3d; }
  .row { display: flex; justify-content: space-between; margin: 4px 0; }
  .row .k { color: #666; }
  .row .v { font-weight: 500; color: #222; font-variant-numeric: tabular-nums; }
  .footer {
    border-top: 1px solid #eee;
    padding: 10px 16px;
    font-size: 11.5px;
    color: #888;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  a { color: #2e6b3a; text-decoration: none; }
  a:hover { text-decoration: underline; }
  button {
    background: #2e6b3a; color: #fff; border: 0; border-radius: 4px;
    padding: 6px 12px; font-size: 12px; cursor: pointer;
  }
  button:hover { background: #1f4e2a; }
</style>
</head>
<body>
  <div class="header">
    <h1>Solar Operator Sync</h1>
    <div class="sub">Connected: Green Mountain Power</div>
  </div>
  <div class="body">
    <div id="status" class="status idle">Loading status…</div>
    <div id="detail"></div>
  </div>
  <div class="footer">
    <a href="#" id="open-options">Settings</a>
    <a href="#" id="open-gmp">Open GMP</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
